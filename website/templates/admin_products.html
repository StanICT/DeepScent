{% extends "base.html" %}
{% block content %}
<h2>Manage Products</h2>
<a href="{{ url_for('admin.add_product') }}">Add New Product</a>
<table>
  <tr>
    <th>Name</th><th>Price</th><th>Stock</th><th>Brand</th>
  </tr>
  {% for product in products %}
  <tr>
    <td>{{ product.name }}</td>
    <td>${{ "%.2f"|format(product.price) }}</td>
    <td>{{ product.stock }}</td>
    <td>{{ product.brand }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
