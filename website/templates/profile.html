{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="container mt-5">
  <h2>Profile Page</h2>

  <!-- Avatar upload form -->
  <form method="POST" action="{{ url_for('auth.upload_avatar') }}" enctype="multipart/form-data">
    <div class="profile-avatar">
      <img id="avatarPreview"
           src="{{ url_for('static', filename='uploads/' ~ user.avatar) if user.avatar else url_for('static', filename='images/default-avatar.png') }}"
           alt="Profile Picture">
      <input type="file" id="avatarInput" name="avatar" accept="image/*">
    </div>
    <button type="submit" class="btn btn-primary mt-3">Save Picture</button>
  </form>

  <p><strong>Username:</strong> {{ user.username }}</p>
  <p><strong>Admin:</strong> {{ 'Yes' if user.is_admin else 'No' }}</p>
</div>
{% endblock %}
