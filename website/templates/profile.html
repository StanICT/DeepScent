{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="container mt-5">
  <h2>Profile Page</h2>

  <!-- Avatar upload form -->
  <form id="avatarForm" method="POST" action="{{ url_for('auth.upload_avatar') }}" enctype="multipart/form-data">
    <div class="profile-avatar">
      <img src="{{ url_for('static', filename='uploads/' ~ user.avatar) 
            if user.avatar 
            else url_for('static', filename='images/default-avatar.png') }}">
      <input type="file" id="avatarInput" name="avatar" accept="image/*">
    </div>
    <!-- Button is optional now -->
    <button type="submit" class="btn btn-primary mt-3">Save Picture</button>
  </form>

  <p><strong>Username:</strong> {{ user.username }}</p>
  <p><strong>Admin:</strong> {{ 'Yes' if user.is_admin else 'No' }}</p>
</div>

<!-- Auto-submit script -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const input = document.getElementById("avatarInput");
    if (input) {
      input.addEventListener("change", function() {
        document.getElementById("avatarForm").submit();
      });
    }
  });
</script>
{% endblock %}
