{% extends "base.html" %}
{% block content %}
<h2>Add Product</h2>
<form method="POST">
  <label>Name:</label><input type="text" name="name"><br>
  <label>Description:</label><textarea name="description"></textarea><br>
  <label>Price:</label><input type="number" step="0.01" name="price"><br>
  <label>Stock:</label><input type="number" name="stock"><br>
  <label>Image filename:</label><input type="text" name="image"><br>
  <label>Brand:</label><input type="text" name="brand"><br>
  <button type="submit">Save</button>
</form>
{% endblock %}
