<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - DEEPSCENT</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background-color: #f5f5f5;
    }

    .card {
      display: flex;
      width: 780px;
      min-height: 480px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    /* LEFT PANEL */
    .left {
      flex: 1;
      background: #ffffff;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left h2 {
      font-size: 26px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .left .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 30px;
    }

    .flash {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .input-group i {
      position: absolute;
      left: 0;
      bottom: 10px;
      color: #bbb;
      font-size: 15px;
    }

    .input-group input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #ddd;
      padding: 10px 10px 10px 28px;
      color: #111;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-group input::placeholder { color: #bbb; }

    .input-group input:focus { border-bottom-color: #cc0000; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      letter-spacing: 1px;
      transition: background 0.2s ease;
    }

    .btn-login:hover {
      background: #cc0000;
    }

    .signup-link {
      margin-top: 20px;
      font-size: 13px;
      color: #999;
      text-align: center;
    }

    .signup-link a {
      color: #cc0000;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover { text-decoration: underline; }

    /* RIGHT PANEL */
    .right {
      width: 260px;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 50px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .right::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 50%;
      top: -60px;
      right: -60px;
    }

    .right::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 50%;
      bottom: -50px;
      left: -50px;
    }

    .right h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1.4;
      z-index: 1;
    }

    .right p {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 12px;
      line-height: 1.7;
      z-index: 1;
    }

    .right .logo {
      font-family: 'Anton', sans-serif;
      font-style: italic;
      font-size: 22px;
      color: #cc0000;
      letter-spacing: 3px;
      margin-bottom: 30px;
      z-index: 1;
    }

    .right .divider {
      width: 30px;
      height: 2px;
      background: #cc0000;
      margin: 16px auto 0;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- LEFT: Login Form -->
    <div class="left">
      <h2>Login</h2>
      <p class="subtitle">Welcome back. Sign in to continue.</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">
            {% for message in messages %}{{ message }}{% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" name="username" placeholder="Username" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-login">Login</button>
      </form>

      <div class="signup-link">
        Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
      </div>
    </div>

    <!-- RIGHT: Welcome Panel -->
    <div class="right">
      <div class="logo">DEEPSCENT</div>
      <h1>WELCOME<br>BACK!</h1>
      <div class="divider"></div>
      <p>Already a Member?<br>Please Login.</p>
    </div>

  </div>
</body>
</html>
