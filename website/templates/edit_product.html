{% extends "base.html" %}
{% block content %}
<h2>Edit Product</h2>
<form method="POST">
  <label>Name:</label><input type="text" name="name" value="{{ product.name }}"><br>
  <label>Description:</label><textarea name="description">{{ product.description }}</textarea><br>
  <label>Price:</label><input type="number" step="0.01" name="price" value="{{ product.price }}"><br>
  <label>Stock:</label><input type="number" name="stock" value="{{ product.stock }}"><br>
  <label>Image filename:</label><input type="text" name="image" value="{{ product.image }}"><br>
  <label>Brand:</label><input type="text" name="brand" value="{{ product.brand }}"><br>
  <button type="submit">Save</button>
</form>
{% endblock %}
